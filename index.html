<!DOCTYPE html>
<html lang="nl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Stagebegeleider</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Serif+Display&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #F5F0E8;
    --surface: #FFFDF8;
    --accent: #2D6A4F;
    --accent-light: #52B788;
    --accent-pale: #D8F3DC;
    --warn: #E76F51;
    --warn-pale: #FDE8E1;
    --warn-soon: #E9C46A;
    --warn-soon-pale: #FDF3D0;
    --text: #1A1A2E;
    --text-muted: #6B7280;
    --border: #E2D9C8;
    --shadow: 0 2px 12px rgba(0,0,0,0.08);
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    font-family: 'DM Sans', sans-serif;
    background: var(--bg);
    color: var(--text);
    min-height: 100vh;
  }

  header {
    background: var(--accent);
    color: white;
    padding: 20px 24px;
    position: sticky;
    top: 0;
    z-index: 100;
    box-shadow: 0 2px 16px rgba(45,106,79,0.3);
  }

  header h1 {
    font-family: 'DM Serif Display', serif;
    font-size: 1.6rem;
    letter-spacing: -0.02em;
  }

  .header-row {
    display: flex;
    align-items: center;
    justify-content: space-between;
    gap: 12px;
    flex-wrap: wrap;
  }

  .sync-status {
    font-size: 0.78rem;
    opacity: 0.85;
    margin-top: 3px;
    display: flex;
    align-items: center;
    gap: 5px;
  }

  .sync-dot {
    width: 7px; height: 7px;
    border-radius: 50%;
    background: #74c69d;
    display: inline-block;
  }
  .sync-dot.syncing { background: #E9C46A; animation: pulse 1s infinite; }
  .sync-dot.error { background: #E76F51; }

  @keyframes pulse { 0%,100%{opacity:1} 50%{opacity:0.4} }

  .btn {
    display: inline-flex;
    align-items: center;
    gap: 6px;
    padding: 9px 18px;
    border-radius: 8px;
    border: none;
    cursor: pointer;
    font-family: 'DM Sans', sans-serif;
    font-size: 0.9rem;
    font-weight: 500;
    transition: all 0.15s;
  }

  .btn-primary { background: white; color: var(--accent); }
  .btn-primary:hover { background: var(--accent-pale); }
  .btn-accent { background: var(--accent); color: white; }
  .btn-accent:hover { background: #245A42; }
  .btn-danger { background: #FDE8E1; color: var(--warn); font-size: 0.82rem; padding: 6px 12px; }
  .btn-danger:hover { background: #fbd5c8; }
  .btn-sm { padding: 6px 14px; font-size: 0.82rem; }
  .btn-ghost { background: transparent; color: var(--text-muted); border: 1.5px solid var(--border); }
  .btn-ghost:hover { background: var(--bg); }

  main { max-width: 900px; margin: 0 auto; padding: 24px 16px; }

  .alert-banner {
    background: var(--warn-pale);
    border: 1.5px solid #f3c4b4;
    border-radius: 12px;
    padding: 14px 18px;
    margin-bottom: 20px;
    display: flex;
    align-items: center;
    gap: 10px;
    font-size: 0.9rem;
    color: #b5421a;
    animation: fadeIn 0.4s ease;
  }

  .alert-banner.warn-soon {
    background: var(--warn-soon-pale);
    border-color: #e2c06a;
    color: #7a5c00;
  }

  .search-bar {
    width: 100%;
    padding: 11px 16px;
    border-radius: 10px;
    border: 1.5px solid var(--border);
    background: var(--surface);
    font-family: 'DM Sans', sans-serif;
    font-size: 0.95rem;
    margin-bottom: 20px;
    outline: none;
    transition: border 0.15s;
  }
  .search-bar:focus { border-color: var(--accent-light); }

  .section-label {
    font-size: 0.75rem;
    font-weight: 600;
    text-transform: uppercase;
    letter-spacing: 0.08em;
    color: var(--text-muted);
    margin-bottom: 10px;
    margin-top: 4px;
  }

  .student-card {
    background: var(--surface);
    border-radius: 14px;
    border: 1.5px solid var(--border);
    padding: 18px 20px;
    margin-bottom: 12px;
    box-shadow: var(--shadow);
    transition: all 0.2s;
    animation: fadeIn 0.3s ease;
  }

  .student-card.overdue { border-color: #f3c4b4; background: #FFFAF8; }
  .student-card.due-soon { border-color: #e2c06a; background: #FFFDF4; }
  .student-card:hover { transform: translateY(-1px); box-shadow: 0 4px 20px rgba(0,0,0,0.1); }

  .card-top { display: flex; align-items: flex-start; justify-content: space-between; gap: 12px; }

  .student-name {
    font-family: 'DM Serif Display', serif;
    font-size: 1.15rem;
    color: var(--text);
    margin-bottom: 3px;
  }

  .stage-place { font-size: 0.9rem; font-weight: 500; color: var(--accent); }
  .stage-address { font-size: 0.82rem; color: var(--text-muted); margin-top: 2px; }

  .card-meta {
    display: flex;
    flex-wrap: wrap;
    gap: 8px;
    margin-top: 12px;
    align-items: center;
  }

  .badge {
    display: inline-flex;
    align-items: center;
    gap: 4px;
    padding: 4px 10px;
    border-radius: 20px;
    font-size: 0.78rem;
    font-weight: 500;
  }

  .badge-green { background: var(--accent-pale); color: var(--accent); }
  .badge-red { background: var(--warn-pale); color: var(--warn); }
  .badge-yellow { background: var(--warn-soon-pale); color: #7a5c00; }
  .badge-gray { background: #F0ECE4; color: var(--text-muted); }

  .card-actions {
    display: flex;
    gap: 8px;
    flex-wrap: wrap;
    margin-top: 14px;
    padding-top: 14px;
    border-top: 1px solid var(--border);
  }

  .status-dot { width: 10px; height: 10px; border-radius: 50%; flex-shrink: 0; margin-top: 6px; }
  .dot-red { background: var(--warn); }
  .dot-yellow { background: var(--warn-soon); }
  .dot-green { background: var(--accent-light); }

  .overlay {
    position: fixed;
    inset: 0;
    background: rgba(0,0,0,0.35);
    z-index: 200;
    display: flex;
    align-items: center;
    justify-content: center;
    padding: 16px;
    animation: fadeIn 0.2s ease;
  }

  .modal {
    background: var(--surface);
    border-radius: 18px;
    padding: 28px 28px 24px;
    width: 100%;
    max-width: 480px;
    box-shadow: 0 8px 40px rgba(0,0,0,0.18);
    animation: slideUp 0.25s ease;
    max-height: 90vh;
    overflow-y: auto;
  }

  .modal h2 {
    font-family: 'DM Serif Display', serif;
    font-size: 1.4rem;
    margin-bottom: 20px;
    color: var(--text);
  }

  .form-group { margin-bottom: 16px; }

  label {
    display: block;
    font-size: 0.82rem;
    font-weight: 600;
    color: var(--text-muted);
    margin-bottom: 5px;
    text-transform: uppercase;
    letter-spacing: 0.05em;
  }

  input, select {
    width: 100%;
    padding: 10px 14px;
    border-radius: 8px;
    border: 1.5px solid var(--border);
    background: var(--bg);
    font-family: 'DM Sans', sans-serif;
    font-size: 0.95rem;
    color: var(--text);
    outline: none;
    transition: border 0.15s;
  }

  input:focus, select:focus { border-color: var(--accent-light); }

  .modal-actions {
    display: flex;
    gap: 10px;
    margin-top: 22px;
    justify-content: flex-end;
  }

  .empty-state { text-align: center; padding: 60px 20px; color: var(--text-muted); }
  .empty-state .icon { font-size: 3rem; margin-bottom: 12px; }
  .empty-state h3 { font-family: 'DM Serif Display', serif; font-size: 1.3rem; color: var(--text); }
  .empty-state p { font-size: 0.9rem; margin-top: 6px; }

  .loading { text-align: center; padding: 60px 20px; color: var(--text-muted); font-size: 0.95rem; }

  @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
  @keyframes slideUp { from { transform: translateY(20px); opacity: 0; } to { transform: translateY(0); opacity: 1; } }

  @media (max-width: 600px) {
    .modal { padding: 22px 18px 18px; }
    .card-top { flex-direction: column; }
  }
</style>
</head>
<body>

<header>
  <div class="header-row">
    <div>
      <h1>📋 Stagebegeleider</h1>
      <div class="sync-status">
        <span class="sync-dot syncing" id="syncDot"></span>
        <span id="syncText">Verbinden...</span>
      </div>
    </div>
    <button class="btn btn-primary" onclick="openModal()">+ Leerling toevoegen</button>
  </div>
</header>

<main>
  <input class="search-bar" type="text" id="searchInput" placeholder="🔍 Zoek op naam, stageplaats of adres..." oninput="renderList()">
  <div id="app"><div class="loading">⏳ Gegevens laden...</div></div>
</main>

<!-- STUDENT MODAL -->
<div class="overlay" id="overlay" style="display:none" onclick="closeIfOutside(event)">
  <div class="modal">
    <h2 id="modalTitle">Leerling toevoegen</h2>
    <div class="form-group">
      <label>Naam leerling</label>
      <input id="f-naam" type="text" placeholder="Bijv. Emma de Vries">
    </div>
    <div class="form-group">
      <label>Stageplaats</label>
      <input id="f-bedrijf" type="text" placeholder="Naam bedrijf of organisatie">
    </div>
    <div class="form-group">
      <label>Adres stageplaats</label>
      <input id="f-adres" type="text" placeholder="Straat + huisnummer, Plaats">
    </div>
    <div class="form-group">
      <label>Laatste bezoekdatum</label>
      <input id="f-datum" type="date">
    </div>
    <div class="form-group">
      <label>Bezoekinterval</label>
      <select id="f-interval">
        <option value="14">Elke 2 weken</option>
        <option value="21">Elke 3 weken</option>
        <option value="28">Elke 4 weken</option>
        <option value="42" selected>Elke 6 weken</option>
        <option value="56">Elke 8 weken</option>
        <option value="custom">Aangepast (dagen)</option>
      </select>
      <input id="f-interval-custom" type="number" placeholder="Aantal dagen" style="display:none;margin-top:8px;" min="1">
    </div>
    <div class="modal-actions">
      <button class="btn btn-ghost" onclick="closeModal()">Annuleren</button>
      <button class="btn btn-accent" onclick="saveStudent()">Opslaan</button>
    </div>
  </div>
</div>

<!-- BEZOEK MODAL -->
<div class="overlay" id="visitOverlay" style="display:none" onclick="closeVisitIfOutside(event)">
  <div class="modal">
    <h2>Bezoek registreren</h2>
    <p style="font-size:0.9rem;color:var(--text-muted);margin-bottom:18px;" id="visitStudentName"></p>
    <div class="form-group">
      <label>Bezoekdatum</label>
      <input id="v-datum" type="date">
    </div>
    <div class="form-group">
      <label>Notitie (optioneel)</label>
      <input id="v-notitie" type="text" placeholder="Bijv. goed gesprek, aandachtspunt...">
    </div>
    <div class="modal-actions">
      <button class="btn btn-ghost" onclick="closeVisitModal()">Annuleren</button>
      <button class="btn btn-accent" onclick="saveVisit()">Bezoek opslaan</button>
    </div>
  </div>
</div>

<script type="module">
  import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
  import { getFirestore, collection, onSnapshot, addDoc, updateDoc, deleteDoc, doc } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js";

  const firebaseConfig = {
    apiKey: "AIzaSyDsdH-Y2IaXqR-96DwQUzDpnp7ma2u5Tnw",
    authDomain: "stagetrack-8d828.firebaseapp.com",
    projectId: "stagetrack-8d828",
    storageBucket: "stagetrack-8d828.firebasestorage.app",
    messagingSenderId: "587283767980",
    appId: "1:587283767980:web:7e582cc1ddc75ae4423509"
  };

  const fbApp = initializeApp(firebaseConfig);
  const db = getFirestore(fbApp);
  const col = collection(db, "leerlingen");

  function setSyncStatus(status) {
    const dot = document.getElementById('syncDot');
    const txt = document.getElementById('syncText');
    if (status === 'ok') { dot.className = 'sync-dot'; txt.textContent = 'Gesynchroniseerd ✓'; }
    else if (status === 'syncing') { dot.className = 'sync-dot syncing'; txt.textContent = 'Synchroniseren...'; }
    else { dot.className = 'sync-dot error'; txt.textContent = 'Verbindingsfout — controleer internet'; }
  }

  onSnapshot(col, (snapshot) => {
    window._students = [];
    snapshot.forEach(d => window._students.push({ id: d.id, ...d.data() }));
    setSyncStatus('ok');
    if (window.renderList) window.renderList();
  }, () => setSyncStatus('error'));

  window._db = {
    add: (data) => addDoc(col, data),
    update: (id, data) => updateDoc(doc(db, "leerlingen", id), data),
    delete: (id) => deleteDoc(doc(db, "leerlingen", id))
  };
</script>

<script>
  window._students = window._students || [];
  let editId = null;
  let visitId = null;

  function getDaysUntilNext(s) {
    const next = new Date(s.datum);
    next.setDate(next.getDate() + s.interval);
    const today = new Date(); today.setHours(0,0,0,0);
    return Math.round((next - today) / 86400000);
  }

  function getStatus(s) {
    const d = getDaysUntilNext(s);
    if (d < 0) return 'overdue';
    if (d <= 7) return 'soon';
    return 'ok';
  }

  function formatDate(str) {
    if (!str) return '—';
    return new Date(str).toLocaleDateString('nl-NL', { day: 'numeric', month: 'short', year: 'numeric' });
  }

  window.renderList = function() {
    const query = (document.getElementById('searchInput')?.value || '').toLowerCase();
    const appEl = document.getElementById('app');
    if (!appEl) return;

    let list = [...(window._students || [])];
    if (query) list = list.filter(s =>
      (s.naam||'').toLowerCase().includes(query) ||
      (s.bedrijf||'').toLowerCase().includes(query) ||
      (s.adres||'').toLowerCase().includes(query)
    );

    list.sort((a, b) => {
      const order = { overdue: 0, soon: 1, ok: 2 };
      const oa = order[getStatus(a)], ob = order[getStatus(b)];
      return oa !== ob ? oa - ob : getDaysUntilNext(a) - getDaysUntilNext(b);
    });

    const overdue = list.filter(s => getStatus(s) === 'overdue');
    const soon = list.filter(s => getStatus(s) === 'soon');
    const ok = list.filter(s => getStatus(s) === 'ok');

    let html = '';
    if (overdue.length) html += `<div class="alert-banner">⚠️ <strong>${overdue.length} leerling${overdue.length>1?'en zijn':' is'} te laat voor een bezoek!</strong></div>`;
    if (soon.length) html += `<div class="alert-banner warn-soon">🕐 <strong>${soon.length} leerling${soon.length>1?'en zijn':' is'} deze week aan de beurt.</strong></div>`;

    if (!list.length) {
      appEl.innerHTML = `<div class="empty-state"><div class="icon">🎓</div><h3>Geen leerlingen gevonden</h3><p>${query ? 'Probeer een andere zoekterm.' : 'Voeg je eerste leerling toe via de knop hierboven.'}</p></div>`;
      return;
    }

    if (overdue.length) { html += `<div class="section-label">Bezoek nodig</div>`; html += overdue.map(cardHTML).join(''); }
    if (soon.length) { html += `<div class="section-label" style="margin-top:${overdue.length?16:0}px">Binnenkort aan de beurt</div>`; html += soon.map(cardHTML).join(''); }
    if (ok.length) { html += `<div class="section-label" style="margin-top:${(overdue.length||soon.length)?16:0}px">Planmatig op schema</div>`; html += ok.map(cardHTML).join(''); }

    appEl.innerHTML = html;
  };

  function cardHTML(s) {
    const status = getStatus(s);
    const days = getDaysUntilNext(s);
    const next = new Date(s.datum);
    next.setDate(next.getDate() + s.interval);

    let dotClass = 'dot-green', badgeClass = 'badge-green', daysText = `Over ${days} dag${days===1?'':'en'}`;
    if (status === 'overdue') { dotClass='dot-red'; badgeClass='badge-red'; daysText=`${Math.abs(days)} dag${Math.abs(days)===1?'':'en'} te laat`; }
    else if (status === 'soon') { dotClass='dot-yellow'; badgeClass='badge-yellow'; daysText=days===0?'Vandaag!':`Over ${days} dag${days===1?'':'en'}`; }

    const lastNote = s.notities && s.notities.length ? s.notities[s.notities.length-1] : null;

    return `<div class="student-card ${status==='overdue'?'overdue':status==='soon'?'due-soon':''}">
      <div class="card-top">
        <div style="flex:1">
          <div style="display:flex;align-items:center;gap:8px">
            <div class="status-dot ${dotClass}"></div>
            <div class="student-name">${s.naam}</div>
          </div>
          <div class="stage-place">🏢 ${s.bedrijf}</div>
          <div class="stage-address">📍 ${s.adres}</div>
        </div>
      </div>
      <div class="card-meta">
        <span class="badge ${badgeClass}">📅 Volgend: ${formatDate(next.toISOString().split('T')[0])} — ${daysText}</span>
        <span class="badge badge-gray">Laatste bezoek: ${formatDate(s.datum)}</span>
        <span class="badge badge-gray">Interval: ${s.interval} dagen</span>
      </div>
      ${lastNote ? `<div style="margin-top:10px;font-size:0.82rem;color:var(--text-muted);background:var(--bg);padding:8px 12px;border-radius:8px;">💬 ${lastNote.tekst}</div>` : ''}
      <div class="card-actions">
        <button class="btn btn-accent btn-sm" onclick="openVisitModal('${s.id}')">✅ Bezoek registreren</button>
        <button class="btn btn-ghost btn-sm" onclick="openEditModal('${s.id}')">✏️ Bewerken</button>
        <button class="btn btn-danger" onclick="deleteStudent('${s.id}')">🗑 Verwijderen</button>
      </div>
    </div>`;
  }

  window.openModal = function(id = null) {
    editId = id;
    document.getElementById('modalTitle').textContent = id ? 'Leerling bewerken' : 'Leerling toevoegen';
    if (id) {
      const s = window._students.find(x => x.id === id);
      document.getElementById('f-naam').value = s.naam;
      document.getElementById('f-bedrijf').value = s.bedrijf;
      document.getElementById('f-adres').value = s.adres;
      document.getElementById('f-datum').value = s.datum;
      const known = ['14','21','28','42','56'];
      if (known.includes(String(s.interval))) {
        document.getElementById('f-interval').value = String(s.interval);
        document.getElementById('f-interval-custom').style.display = 'none';
      } else {
        document.getElementById('f-interval').value = 'custom';
        document.getElementById('f-interval-custom').style.display = 'block';
        document.getElementById('f-interval-custom').value = s.interval;
      }
    } else {
      ['f-naam','f-bedrijf','f-adres'].forEach(id => document.getElementById(id).value = '');
      document.getElementById('f-datum').value = new Date().toISOString().split('T')[0];
      document.getElementById('f-interval').value = '42';
      document.getElementById('f-interval-custom').style.display = 'none';
    }
    document.getElementById('overlay').style.display = 'flex';
  };

  window.openEditModal = (id) => window.openModal(id);

  window.closeModal = () => { document.getElementById('overlay').style.display = 'none'; editId = null; };
  window.closeIfOutside = (e) => { if (e.target === document.getElementById('overlay')) window.closeModal(); };

  document.getElementById('f-interval').addEventListener('change', function() {
    document.getElementById('f-interval-custom').style.display = this.value === 'custom' ? 'block' : 'none';
  });

  window.saveStudent = async function() {
    const naam = document.getElementById('f-naam').value.trim();
    const bedrijf = document.getElementById('f-bedrijf').value.trim();
    const adres = document.getElementById('f-adres').value.trim();
    const datum = document.getElementById('f-datum').value;
    const sel = document.getElementById('f-interval').value;
    const interval = sel === 'custom' ? (parseInt(document.getElementById('f-interval-custom').value)||42) : parseInt(sel);
    if (!naam || !bedrijf || !datum) { alert('Vul naam, stageplaats en datum in.'); return; }
    if (editId) {
      await window._db.update(editId, { naam, bedrijf, adres, datum, interval });
    } else {
      await window._db.add({ naam, bedrijf, adres, datum, interval, notities: [] });
    }
    window.closeModal();
  };

  window.deleteStudent = async function(id) {
    if (!confirm('Weet je zeker dat je deze leerling wilt verwijderen?')) return;
    await window._db.delete(id);
  };

  window.openVisitModal = function(id) {
    visitId = id;
    const s = window._students.find(x => x.id === id);
    document.getElementById('visitStudentName').textContent = `${s.naam} — ${s.bedrijf}`;
    document.getElementById('v-datum').value = new Date().toISOString().split('T')[0];
    document.getElementById('v-notitie').value = '';
    document.getElementById('visitOverlay').style.display = 'flex';
  };

  window.closeVisitModal = () => { document.getElementById('visitOverlay').style.display = 'none'; visitId = null; };
  window.closeVisitIfOutside = (e) => { if (e.target === document.getElementById('visitOverlay')) window.closeVisitModal(); };

  window.saveVisit = async function() {
    const datum = document.getElementById('v-datum').value;
    const tekst = document.getElementById('v-notitie').value.trim();
    if (!datum) { alert('Vul een datum in.'); return; }
    const s = window._students.find(x => x.id === visitId);
    const notities = [...(s.notities || [])];
    if (tekst) notities.push({ datum, tekst });
    await window._db.update(visitId, { datum, notities });
    window.closeVisitModal();
  };
</script>
</body>
</html>
