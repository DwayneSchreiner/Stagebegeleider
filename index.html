<!DOCTYPE html>
<html lang="nl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Stagebegeleider</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Serif+Display&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #F5F0E8;
    --surface: #FFFDF8;
    --accent: #2D6A4F;
    --accent-light: #52B788;
    --accent-pale: #D8F3DC;
    --warn: #E76F51;
    --warn-pale: #FDE8E1;
    --warn-soon: #E9C46A;
    --warn-soon-pale: #FDF3D0;
    --nostage: #9B9B9B;
    --nostage-pale: #F0EDED;
    --text: #1A1A2E;
    --text-muted: #6B7280;
    --border: #E2D9C8;
    --shadow: 0 2px 12px rgba(0,0,0,0.08);
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { font-family: 'DM Sans', sans-serif; background: var(--bg); color: var(--text); min-height: 100vh; }

  /* LOGIN */
  #loginScreen { min-height: 100vh; display: flex; align-items: center; justify-content: center; padding: 24px; background: var(--accent); }
  .login-card { background: var(--surface); border-radius: 20px; padding: 40px 36px; width: 100%; max-width: 380px; box-shadow: 0 12px 48px rgba(0,0,0,0.25); text-align: center; animation: slideUp 0.3s ease; }
  .login-card .logo { font-size: 2.5rem; margin-bottom: 12px; }
  .login-card h1 { font-family: 'DM Serif Display', serif; font-size: 1.6rem; color: var(--text); margin-bottom: 6px; }
  .login-card p { font-size: 0.85rem; color: var(--text-muted); margin-bottom: 28px; }
  .login-input { width: 100%; padding: 12px 16px; border-radius: 10px; border: 1.5px solid var(--border); background: var(--bg); font-family: 'DM Sans', sans-serif; font-size: 1rem; color: var(--text); outline: none; margin-bottom: 12px; text-align: center; letter-spacing: 0.05em; transition: border 0.15s; }
  .login-input:focus { border-color: var(--accent-light); }
  .login-input.error { border-color: var(--warn); animation: shake 0.3s ease; }
  .login-btn { width: 100%; padding: 12px; background: var(--accent); color: white; border: none; border-radius: 10px; font-family: 'DM Sans', sans-serif; font-size: 1rem; font-weight: 600; cursor: pointer; transition: background 0.15s; }
  .login-btn:hover { background: #245A42; }
  .login-error { color: var(--warn); font-size: 0.85rem; margin-top: 10px; display: none; }

  #mainApp { display: none; }

  /* HEADER */
  header { background: var(--accent); color: white; padding: 20px 24px; position: sticky; top: 0; z-index: 100; box-shadow: 0 2px 16px rgba(45,106,79,0.3); }
  header h1 { font-family: 'DM Serif Display', serif; font-size: 1.6rem; letter-spacing: -0.02em; }
  .header-row { display: flex; align-items: center; justify-content: space-between; gap: 12px; flex-wrap: wrap; }
  .sync-status { font-size: 0.78rem; opacity: 0.85; margin-top: 3px; display: flex; align-items: center; gap: 5px; }
  .sync-dot { width: 7px; height: 7px; border-radius: 50%; background: #74c69d; display: inline-block; }
  .sync-dot.syncing { background: #E9C46A; animation: pulse 1s infinite; }
  .sync-dot.error { background: #E76F51; }
  .logout-btn { background: rgba(255,255,255,0.15); color: white; border: 1px solid rgba(255,255,255,0.3); padding: 6px 14px; border-radius: 8px; font-family: 'DM Sans', sans-serif; font-size: 0.8rem; cursor: pointer; transition: background 0.15s; }
  .logout-btn:hover { background: rgba(255,255,255,0.25); }

  /* STATS BAR */
  .stats-bar { display: flex; gap: 10px; flex-wrap: wrap; margin-bottom: 16px; }

  .stat-card {
    background: var(--surface);
    border: 1.5px solid var(--border);
    border-radius: 12px;
    padding: 12px 18px;
    flex: 1;
    min-width: 110px;
    text-align: center;
    box-shadow: var(--shadow);
    cursor: pointer;
    transition: all 0.18s;
    user-select: none;
  }
  .stat-card:hover { transform: translateY(-2px); box-shadow: 0 6px 20px rgba(0,0,0,0.1); }
  .stat-card.active { border-color: var(--accent); background: var(--accent-pale); box-shadow: 0 0 0 3px rgba(45,106,79,0.15); }
  .stat-card.active-warn { border-color: var(--warn); background: var(--warn-pale); box-shadow: 0 0 0 3px rgba(231,111,81,0.15); }
  .stat-card.active-gray { border-color: var(--nostage); background: var(--nostage-pale); box-shadow: 0 0 0 3px rgba(155,155,155,0.15); }

  .stat-number { font-family: 'DM Serif Display', serif; font-size: 1.8rem; color: var(--accent); line-height: 1; }
  .stat-card.warn .stat-number { color: var(--warn); }
  .stat-card.gray .stat-number { color: var(--nostage); }
  .stat-label { font-size: 0.75rem; color: var(--text-muted); margin-top: 4px; font-weight: 500; }

  .filter-bar {
    display: flex;
    align-items: center;
    gap: 8px;
    margin-bottom: 14px;
    font-size: 0.85rem;
    color: var(--text-muted);
    min-height: 28px;
  }

  .filter-tag {
    display: inline-flex;
    align-items: center;
    gap: 6px;
    background: var(--accent-pale);
    color: var(--accent);
    border-radius: 20px;
    padding: 4px 12px;
    font-size: 0.82rem;
    font-weight: 600;
    cursor: pointer;
  }
  .filter-tag:hover { background: #c3eacc; }
  .filter-tag .x { font-size: 1rem; line-height: 1; }

  /* BUTTONS */
  .btn { display: inline-flex; align-items: center; gap: 6px; padding: 9px 18px; border-radius: 8px; border: none; cursor: pointer; font-family: 'DM Sans', sans-serif; font-size: 0.9rem; font-weight: 500; transition: all 0.15s; }
  .btn-primary { background: white; color: var(--accent); }
  .btn-primary:hover { background: var(--accent-pale); }
  .btn-accent { background: var(--accent); color: white; }
  .btn-accent:hover { background: #245A42; }
  .btn-danger { background: #FDE8E1; color: var(--warn); font-size: 0.82rem; padding: 6px 12px; }
  .btn-danger:hover { background: #fbd5c8; }
  .btn-sm { padding: 6px 14px; font-size: 0.82rem; }
  .btn-ghost { background: transparent; color: var(--text-muted); border: 1.5px solid var(--border); }
  .btn-ghost:hover { background: var(--bg); }

  main { max-width: 900px; margin: 0 auto; padding: 24px 16px; }

  .alert-banner { background: var(--warn-pale); border: 1.5px solid #f3c4b4; border-radius: 12px; padding: 14px 18px; margin-bottom: 20px; display: flex; align-items: center; gap: 10px; font-size: 0.9rem; color: #b5421a; animation: fadeIn 0.4s ease; }
  .alert-banner.warn-soon { background: var(--warn-soon-pale); border-color: #e2c06a; color: #7a5c00; }

  .search-bar { width: 100%; padding: 11px 16px; border-radius: 10px; border: 1.5px solid var(--border); background: var(--surface); font-family: 'DM Sans', sans-serif; font-size: 0.95rem; margin-bottom: 20px; outline: none; transition: border 0.15s; }
  .search-bar:focus { border-color: var(--accent-light); }

  .section-label { font-size: 0.75rem; font-weight: 600; text-transform: uppercase; letter-spacing: 0.08em; color: var(--text-muted); margin-bottom: 10px; margin-top: 4px; }

  .student-card { background: var(--surface); border-radius: 14px; border: 1.5px solid var(--border); padding: 18px 20px; margin-bottom: 12px; box-shadow: var(--shadow); transition: all 0.2s; animation: fadeIn 0.3s ease; }
  .student-card.overdue { border-color: #f3c4b4; background: #FFFAF8; }
  .student-card.due-soon { border-color: #e2c06a; background: #FFFDF4; }
  .student-card.no-stage { border-color: #ddd; background: #FAFAFA; opacity: 0.85; }
  .student-card:hover { transform: translateY(-1px); box-shadow: 0 4px 20px rgba(0,0,0,0.1); }

  .student-name { font-family: 'DM Serif Display', serif; font-size: 1.15rem; color: var(--text); margin-bottom: 3px; }
  .stage-place { font-size: 0.9rem; font-weight: 500; color: var(--accent); }
  .stage-address { font-size: 0.82rem; color: var(--text-muted); margin-top: 2px; }
  .card-meta { display: flex; flex-wrap: wrap; gap: 8px; margin-top: 12px; align-items: center; }

  .badge { display: inline-flex; align-items: center; gap: 4px; padding: 4px 10px; border-radius: 20px; font-size: 0.78rem; font-weight: 500; }
  .badge-green { background: var(--accent-pale); color: var(--accent); }
  .badge-red { background: var(--warn-pale); color: var(--warn); }
  .badge-yellow { background: var(--warn-soon-pale); color: #7a5c00; }
  .badge-gray { background: #F0ECE4; color: var(--text-muted); }
  .badge-nostage { background: var(--nostage-pale); color: var(--nostage); }

  .card-actions { display: flex; gap: 8px; flex-wrap: wrap; margin-top: 14px; padding-top: 14px; border-top: 1px solid var(--border); }
  .status-dot { width: 10px; height: 10px; border-radius: 50%; flex-shrink: 0; margin-top: 8px; }
  .dot-red { background: var(--warn); }
  .dot-yellow { background: var(--warn-soon); }
  .dot-green { background: var(--accent-light); }
  .dot-gray { background: #bbb; }

  .card-info-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 4px 16px; margin-top: 6px; font-size: 0.82rem; color: var(--text-muted); }
  .card-info-grid span { display: flex; align-items: center; gap: 4px; }
  .vrije-info { margin-top: 10px; font-size: 0.82rem; color: var(--text-muted); background: var(--bg); padding: 8px 12px; border-radius: 8px; border-left: 3px solid var(--border); }

  /* MODAL */
  .overlay { position: fixed; inset: 0; background: rgba(0,0,0,0.35); z-index: 200; display: flex; align-items: center; justify-content: center; padding: 16px; animation: fadeIn 0.2s ease; }
  .modal { background: var(--surface); border-radius: 18px; padding: 28px 28px 24px; width: 100%; max-width: 500px; box-shadow: 0 8px 40px rgba(0,0,0,0.18); animation: slideUp 0.25s ease; max-height: 92vh; overflow-y: auto; }
  .modal h2 { font-family: 'DM Serif Display', serif; font-size: 1.4rem; margin-bottom: 20px; color: var(--text); }
  .form-section { font-size: 0.72rem; font-weight: 700; text-transform: uppercase; letter-spacing: 0.08em; color: var(--accent); margin: 18px 0 10px; padding-bottom: 6px; border-bottom: 1.5px solid var(--accent-pale); }
  .form-group { margin-bottom: 14px; }
  label { display: block; font-size: 0.82rem; font-weight: 600; color: var(--text-muted); margin-bottom: 5px; text-transform: uppercase; letter-spacing: 0.05em; }
  input, select, textarea { width: 100%; padding: 10px 14px; border-radius: 8px; border: 1.5px solid var(--border); background: var(--bg); font-family: 'DM Sans', sans-serif; font-size: 0.95rem; color: var(--text); outline: none; transition: border 0.15s; }
  input:focus, select:focus, textarea:focus { border-color: var(--accent-light); }
  textarea { resize: vertical; min-height: 72px; }
  .form-row { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; }
  .modal-actions { display: flex; gap: 10px; margin-top: 22px; justify-content: flex-end; }

  .toggle-row { display: flex; align-items: center; justify-content: space-between; background: var(--bg); padding: 10px 14px; border-radius: 8px; border: 1.5px solid var(--border); margin-bottom: 14px; }
  .toggle-row label { margin: 0; text-transform: none; font-size: 0.9rem; color: var(--text); letter-spacing: 0; }
  .toggle { position: relative; width: 42px; height: 24px; }
  .toggle input { opacity: 0; width: 0; height: 0; }
  .toggle-slider { position: absolute; cursor: pointer; inset: 0; background: #ccc; border-radius: 24px; transition: 0.2s; }
  .toggle-slider:before { content: ''; position: absolute; height: 18px; width: 18px; left: 3px; bottom: 3px; background: white; border-radius: 50%; transition: 0.2s; }
  .toggle input:checked + .toggle-slider { background: var(--accent); }
  .toggle input:checked + .toggle-slider:before { transform: translateX(18px); }

  .empty-state { text-align: center; padding: 60px 20px; color: var(--text-muted); }
  .empty-state .icon { font-size: 3rem; margin-bottom: 12px; }
  .empty-state h3 { font-family: 'DM Serif Display', serif; font-size: 1.3rem; color: var(--text); }
  .empty-state p { font-size: 0.9rem; margin-top: 6px; }
  .loading { text-align: center; padding: 60px 20px; color: var(--text-muted); font-size: 0.95rem; }

  @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
  @keyframes slideUp { from { transform: translateY(20px); opacity: 0; } to { transform: translateY(0); opacity: 1; } }
  @keyframes pulse { 0%,100%{opacity:1} 50%{opacity:0.4} }
  @keyframes shake { 0%,100%{transform:translateX(0)} 25%{transform:translateX(-6px)} 75%{transform:translateX(6px)} }

  @media (max-width: 600px) {
    .modal { padding: 22px 18px 18px; }
    .login-card { padding: 32px 24px; }
    .form-row { grid-template-columns: 1fr; }
    .card-info-grid { grid-template-columns: 1fr; }
  }
</style>
</head>
<body>

<!-- LOGIN -->
<div id="loginScreen">
  <div class="login-card">
    <div class="logo">📋</div>
    <h1>Stagebegeleider</h1>
    <p>Voer je wachtwoord in om door te gaan</p>
    <input class="login-input" type="password" id="pwInput" placeholder="Wachtwoord" onkeydown="if(event.key==='Enter')checkLogin()">
    <button class="login-btn" onclick="checkLogin()">Inloggen</button>
    <div class="login-error" id="loginError">Onjuist wachtwoord, probeer opnieuw.</div>
  </div>
</div>

<!-- MAIN APP -->
<div id="mainApp">
  <header>
    <div class="header-row">
      <div>
        <h1>📋 Stagebegeleider</h1>
        <div class="sync-status">
          <span class="sync-dot syncing" id="syncDot"></span>
          <span id="syncText">Verbinden...</span>
        </div>
      </div>
      <div style="display:flex;gap:10px;align-items:center;flex-wrap:wrap;">
        <button class="btn btn-primary" onclick="openModal()">+ Leerling toevoegen</button>
        <button class="logout-btn" onclick="logout()">Uitloggen</button>
      </div>
    </div>
  </header>

  <main>
    <div class="stats-bar" id="statsBar"></div>
    <div class="filter-bar" id="filterBar"></div>
    <input class="search-bar" type="text" id="searchInput" placeholder="🔍 Zoek op naam, klas, stageplaats of adres..." oninput="renderList()">
    <div id="app"><div class="loading">⏳ Gegevens laden...</div></div>
  </main>
</div>

<!-- STUDENT MODAL -->
<div class="overlay" id="overlay" style="display:none" onclick="closeIfOutside(event)">
  <div class="modal">
    <h2 id="modalTitle">Leerling toevoegen</h2>
    <div class="toggle-row">
      <label for="f-geenstage">🚫 Geen stage (momenteel)</label>
      <label class="toggle"><input type="checkbox" id="f-geenstage" onchange="toggleStageFields()"><span class="toggle-slider"></span></label>
    </div>
    <div class="form-section">Leerling</div>
    <div class="form-row">
      <div class="form-group"><label>Naam leerling</label><input id="f-naam" type="text" placeholder="Bijv. Emma de Vries"></div>
      <div class="form-group"><label>Klas</label><input id="f-klas" type="text" placeholder="Bijv. 3A"></div>
    </div>
    <div class="form-group"><label>Mentor</label><input id="f-mentor" type="text" placeholder="Naam van de mentor"></div>
    <div id="stageFields">
      <div class="form-section">Stageplaats</div>
      <div class="form-group"><label>Naam stageplaats</label><input id="f-bedrijf" type="text" placeholder="Naam bedrijf of organisatie"></div>
      <div class="form-group"><label>Adres stageplaats</label><input id="f-adres" type="text" placeholder="Straat + huisnummer, Plaats"></div>
      <div class="form-row">
        <div class="form-group"><label>Begeleider stageplaats</label><input id="f-begeleider" type="text" placeholder="Naam begeleider"></div>
        <div class="form-group"><label>Telefoonnummer</label><input id="f-telefoon" type="tel" placeholder="06-12345678"></div>
      </div>
      <div class="form-section">Bezoek</div>
      <div class="form-group"><label>Laatste bezoekdatum</label><input id="f-datum" type="date"></div>
      <div class="form-group">
        <label>Bezoekinterval</label>
        <select id="f-interval">
          <option value="14">Elke 2 weken</option>
          <option value="21">Elke 3 weken</option>
          <option value="28">Elke 4 weken</option>
          <option value="42" selected>Elke 6 weken</option>
          <option value="56">Elke 8 weken</option>
          <option value="custom">Aangepast (dagen)</option>
          <option value="0">Geen bezoek nodig</option>
        </select>
        <input id="f-interval-custom" type="number" placeholder="Aantal dagen" style="display:none;margin-top:8px;" min="1">
      </div>
    </div>
    <div class="form-section">Overig</div>
    <div class="form-group"><label>Vrije informatie</label><textarea id="f-vrij" placeholder="Bijv. bijzonderheden, afspraken, aandachtspunten..."></textarea></div>
    <div class="modal-actions">
      <button class="btn btn-ghost" onclick="closeModal()">Annuleren</button>
      <button class="btn btn-accent" onclick="saveStudent()">Opslaan</button>
    </div>
  </div>
</div>

<!-- BEZOEK MODAL -->
<div class="overlay" id="visitOverlay" style="display:none" onclick="closeVisitIfOutside(event)">
  <div class="modal">
    <h2>Bezoek registreren</h2>
    <p style="font-size:0.9rem;color:var(--text-muted);margin-bottom:18px;" id="visitStudentName"></p>
    <div class="form-group"><label>Bezoekdatum</label><input id="v-datum" type="date"></div>
    <div class="form-group"><label>Notitie (optioneel)</label><input id="v-notitie" type="text" placeholder="Bijv. goed gesprek, aandachtspunt..."></div>
    <div class="modal-actions">
      <button class="btn btn-ghost" onclick="closeVisitModal()">Annuleren</button>
      <button class="btn btn-accent" onclick="saveVisit()">Bezoek opslaan</button>
    </div>
  </div>
</div>

<script type="module">
  import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
  import { getFirestore, collection, onSnapshot, addDoc, updateDoc, deleteDoc, doc } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js";

  const firebaseConfig = {
    apiKey: "AIzaSyDsdH-Y2IaXqR-96DwQUzDpnp7ma2u5Tnw",
    authDomain: "stagetrack-8d828.firebaseapp.com",
    projectId: "stagetrack-8d828",
    storageBucket: "stagetrack-8d828.firebasestorage.app",
    messagingSenderId: "587283767980",
    appId: "1:587283767980:web:7e582cc1ddc75ae4423509"
  };

  const fbApp = initializeApp(firebaseConfig);
  const db = getFirestore(fbApp);
  const col = collection(db, "leerlingen");

  function setSyncStatus(status) {
    const dot = document.getElementById('syncDot');
    const txt = document.getElementById('syncText');
    if (status === 'ok') { dot.className = 'sync-dot'; txt.textContent = 'Gesynchroniseerd ✓'; }
    else if (status === 'syncing') { dot.className = 'sync-dot syncing'; txt.textContent = 'Synchroniseren...'; }
    else { dot.className = 'sync-dot error'; txt.textContent = 'Verbindingsfout'; }
  }

  let unsubscribe = null;
  window._startSync = function() {
    if (unsubscribe) return;
    setSyncStatus('syncing');
    unsubscribe = onSnapshot(col, (snapshot) => {
      window._students = [];
      snapshot.forEach(d => window._students.push({ id: d.id, ...d.data() }));
      setSyncStatus('ok');
      if (window.renderList) window.renderList();
    }, () => setSyncStatus('error'));
  };

  window._db = {
    add: (data) => addDoc(col, data),
    update: (id, data) => updateDoc(doc(db, "leerlingen", id), data),
    delete: (id) => deleteDoc(doc(db, "leerlingen", id))
  };
</script>

<script>
  window._students = [];
  let editId = null;
  let visitId = null;
  let activeFilter = null; // 'all' | 'stage' | 'nostage' | 'telaat'

  function checkLogin() {
    const pw = document.getElementById('pwInput').value;
    const input = document.getElementById('pwInput');
    if (pw === 'DwayneCurio2904!') {
      sessionStorage.setItem('sb_auth', '1');
      document.getElementById('loginScreen').style.display = 'none';
      document.getElementById('mainApp').style.display = 'block';
      window._startSync();
    } else {
      input.classList.add('error');
      document.getElementById('loginError').style.display = 'block';
      setTimeout(() => input.classList.remove('error'), 400);
    }
  }

  function logout() {
    sessionStorage.removeItem('sb_auth');
    document.getElementById('mainApp').style.display = 'none';
    document.getElementById('loginScreen').style.display = 'flex';
    document.getElementById('pwInput').value = '';
    document.getElementById('loginError').style.display = 'none';
  }

  if (sessionStorage.getItem('sb_auth') === '1') {
    document.getElementById('loginScreen').style.display = 'none';
    document.getElementById('mainApp').style.display = 'block';
    setTimeout(() => window._startSync && window._startSync(), 100);
  }

  window.checkLogin = checkLogin;
  window.logout = logout;

  function getDaysUntilNext(s) {
    if (s.geenstage || s.interval == 0) return 9999;
    const next = new Date(s.datum);
    next.setDate(next.getDate() + s.interval);
    const today = new Date(); today.setHours(0,0,0,0);
    return Math.round((next - today) / 86400000);
  }

  function getStatus(s) {
    if (s.geenstage) return 'nostage';
    if (s.interval == 0) return 'novisit';
    const d = getDaysUntilNext(s);
    if (d < 0) return 'overdue';
    if (d <= 7) return 'soon';
    return 'ok';
  }

  function formatDate(str) {
    if (!str) return '—';
    return new Date(str).toLocaleDateString('nl-NL', { day: 'numeric', month: 'short', year: 'numeric' });
  }

  function setFilter(filter) {
    activeFilter = activeFilter === filter ? null : filter;
    renderList();
  }
  window.setFilter = setFilter;
  window.clearFilter = () => { activeFilter = null; renderList(); };

  function renderStats() {
    const all = window._students || [];
    const total = all.length;
    const metStage = all.filter(s => !s.geenstage).length;
    const zonderStage = all.filter(s => s.geenstage).length;
    const telLaat = all.filter(s => getStatus(s) === 'overdue').length;

    const af = activeFilter;

    document.getElementById('statsBar').innerHTML = `
      <div class="stat-card ${af==='all'?'active':''}" onclick="setFilter('all')" title="Klik om te filteren">
        <div class="stat-number" style="color:var(--text)">${total}</div>
        <div class="stat-label">Totaal leerlingen</div>
      </div>
      <div class="stat-card ${af==='stage'?'active':''}" onclick="setFilter('stage')" title="Klik om te filteren">
        <div class="stat-number" style="color:var(--accent)">${metStage}</div>
        <div class="stat-label">Met stage</div>
      </div>
      <div class="stat-card gray ${af==='nostage'?'active-gray':''}" onclick="setFilter('nostage')" title="Klik om te filteren">
        <div class="stat-number">${zonderStage}</div>
        <div class="stat-label">Zonder stage</div>
      </div>
      ${telLaat > 0 ? `<div class="stat-card warn ${af==='telaat'?'active-warn':''}" onclick="setFilter('telaat')" title="Klik om te filteren">
        <div class="stat-number">${telLaat}</div>
        <div class="stat-label">Bezoek te laat</div>
      </div>` : ''}
    `;
  }

  function renderFilterBar() {
    const bar = document.getElementById('filterBar');
    const labels = { all: 'Alle leerlingen', stage: 'Met stage', nostage: 'Zonder stage', telaat: 'Bezoek te laat' };
    if (activeFilter) {
      bar.innerHTML = `<span>Gefilterd op:</span> <span class="filter-tag" onclick="clearFilter()"><span>${labels[activeFilter]}</span><span class="x">✕</span></span>`;
    } else {
      bar.innerHTML = '';
    }
  }

  window.renderList = function() {
    renderStats();
    renderFilterBar();

    const query = (document.getElementById('searchInput')?.value || '').toLowerCase();
    const appEl = document.getElementById('app');
    if (!appEl) return;

    let list = [...(window._students || [])];

    // Apply stat filter
    if (activeFilter === 'all') { /* show all */ }
    else if (activeFilter === 'stage') list = list.filter(s => !s.geenstage);
    else if (activeFilter === 'nostage') list = list.filter(s => s.geenstage);
    else if (activeFilter === 'telaat') list = list.filter(s => getStatus(s) === 'overdue');

    // Apply search
    if (query) list = list.filter(s =>
      (s.naam||'').toLowerCase().includes(query) ||
      (s.klas||'').toLowerCase().includes(query) ||
      (s.bedrijf||'').toLowerCase().includes(query) ||
      (s.adres||'').toLowerCase().includes(query) ||
      (s.mentor||'').toLowerCase().includes(query)
    );

    const overdue = list.filter(s => getStatus(s) === 'overdue');
    const soon = list.filter(s => getStatus(s) === 'soon');
    const ok = list.filter(s => getStatus(s) === 'ok');
    const novisit = list.filter(s => getStatus(s) === 'novisit');
    const nostage = list.filter(s => getStatus(s) === 'nostage');

    let html = '';
    if (!activeFilter || activeFilter === 'all') {
      if (overdue.length) html += `<div class="alert-banner">⚠️ <strong>${overdue.length} leerling${overdue.length>1?'en zijn':' is'} te laat voor een bezoek!</strong></div>`;
      if (soon.length) html += `<div class="alert-banner warn-soon">🕐 <strong>${soon.length} leerling${soon.length>1?'en zijn':' is'} deze week aan de beurt.</strong></div>`;
    }

    if (!list.length) {
      appEl.innerHTML = `<div class="empty-state"><div class="icon">🎓</div><h3>Geen leerlingen gevonden</h3><p>${query ? 'Probeer een andere zoekterm.' : 'Geen leerlingen in deze categorie.'}</p></div>`;
      return;
    }

    // When filtering on telaat, just show flat list with label
    if (activeFilter === 'telaat') {
      html += `<div class="section-label">${list.length} leerling${list.length>1?'en':''} te laat</div>`;
      html += list.map(cardHTML).join('');
    } else if (activeFilter === 'nostage') {
      html += `<div class="section-label">${list.length} leerling${list.length>1?'en':''} zonder stage</div>`;
      html += list.map(cardHTML).join('');
    } else if (activeFilter === 'stage') {
      if (overdue.length) { html += `<div class="alert-banner">⚠️ <strong>${overdue.length} leerling${overdue.length>1?'en zijn':' is'} te laat voor een bezoek!</strong></div>`; }
      if (soon.length) { html += `<div class="alert-banner warn-soon">🕐 <strong>${soon.length} leerling${soon.length>1?'en zijn':' is'} deze week aan de beurt.</strong></div>`; }
      if (overdue.length) { html += `<div class="section-label">Bezoek nodig</div>`; html += overdue.map(cardHTML).join(''); }
      if (soon.length) { html += `<div class="section-label" style="margin-top:${overdue.length?16:0}px">Binnenkort aan de beurt</div>`; html += soon.map(cardHTML).join(''); }
      if (ok.length) { html += `<div class="section-label" style="margin-top:${(overdue.length||soon.length)?16:0}px">Op schema</div>`; html += ok.map(cardHTML).join(''); }
      if (novisit.length) { html += `<div class="section-label" style="margin-top:16px">Geen bezoek nodig</div>`; html += novisit.map(cardHTML).join(''); }
    } else {
      if (overdue.length) { html += `<div class="section-label">Bezoek nodig</div>`; html += overdue.map(cardHTML).join(''); }
      if (soon.length) { html += `<div class="section-label" style="margin-top:${overdue.length?16:0}px">Binnenkort aan de beurt</div>`; html += soon.map(cardHTML).join(''); }
      if (ok.length) { html += `<div class="section-label" style="margin-top:${(overdue.length||soon.length)?16:0}px">Planmatig op schema</div>`; html += ok.map(cardHTML).join(''); }
      if (novisit.length) { html += `<div class="section-label" style="margin-top:16px">Geen bezoek nodig</div>`; html += novisit.map(cardHTML).join(''); }
      if (nostage.length) { html += `<div class="section-label" style="margin-top:16px">Zonder stage</div>`; html += nostage.map(cardHTML).join(''); }
    }

    appEl.innerHTML = html;
  };

  function cardHTML(s) {
    const status = getStatus(s);
    let dotClass = 'dot-green', cardClass = '', badgeHTML = '';

    if (status === 'nostage') {
      dotClass = 'dot-gray'; cardClass = 'no-stage';
      badgeHTML = `<span class="badge badge-nostage">🚫 Geen stage</span>`;
    } else if (status === 'novisit') {
      dotClass = 'dot-gray';
      badgeHTML = `<span class="badge badge-gray">📋 Geen bezoek gepland</span>`;
    } else {
      const days = getDaysUntilNext(s);
      const next = new Date(s.datum);
      next.setDate(next.getDate() + s.interval);
      let daysText = `Over ${days} dag${days===1?'':'en'}`;
      if (status === 'overdue') { dotClass='dot-red'; cardClass='overdue'; daysText=`${Math.abs(days)} dag${Math.abs(days)===1?'':'en'} te laat`; badgeHTML=`<span class="badge badge-red">📅 Volgend: ${formatDate(next.toISOString().split('T')[0])} — ${daysText}</span>`; }
      else if (status === 'soon') { dotClass='dot-yellow'; cardClass='due-soon'; daysText=days===0?'Vandaag!':`Over ${days} dag${days===1?'':'en'}`; badgeHTML=`<span class="badge badge-yellow">📅 Volgend: ${formatDate(next.toISOString().split('T')[0])} — ${daysText}</span>`; }
      else { badgeHTML=`<span class="badge badge-green">📅 Volgend: ${formatDate(next.toISOString().split('T')[0])} — ${daysText}</span>`; }
      badgeHTML += `<span class="badge badge-gray">Laatste bezoek: ${formatDate(s.datum)}</span>`;
    }

    const lastNote = s.notities && s.notities.length ? s.notities[s.notities.length-1] : null;
    const infoItems = [
      s.klas ? `<span>🎓 Klas: ${s.klas}</span>` : '',
      s.mentor ? `<span>👤 Mentor: ${s.mentor}</span>` : '',
      s.begeleider ? `<span>🏢 Begeleider: ${s.begeleider}</span>` : '',
      s.telefoon ? `<span>📞 <a href="tel:${s.telefoon}" style="color:var(--accent);text-decoration:none;">${s.telefoon}</a></span>` : '',
    ].filter(Boolean).join('');

    const visitBtn = (status !== 'nostage' && status !== 'novisit')
      ? `<button class="btn btn-accent btn-sm" onclick="openVisitModal('${s.id}')">✅ Bezoek registreren</button>` : '';

    return `<div class="student-card ${cardClass}">
      <div style="display:flex;align-items:flex-start;gap:8px">
        <div class="status-dot ${dotClass}"></div>
        <div style="flex:1">
          <div class="student-name">${s.naam}</div>
          ${s.bedrijf ? `<div class="stage-place">🏢 ${s.bedrijf}</div>` : ''}
          ${s.adres ? `<div class="stage-address">📍 ${s.adres}</div>` : ''}
          ${infoItems ? `<div class="card-info-grid">${infoItems}</div>` : ''}
        </div>
      </div>
      <div class="card-meta">${badgeHTML}</div>
      ${s.vrij ? `<div class="vrije-info">📝 ${s.vrij}</div>` : ''}
      ${lastNote ? `<div class="vrije-info" style="border-left-color:var(--accent-light);">💬 ${lastNote.tekst}</div>` : ''}
      <div class="card-actions">
        ${visitBtn}
        <button class="btn btn-ghost btn-sm" onclick="openEditModal('${s.id}')">✏️ Bewerken</button>
        <button class="btn btn-danger" onclick="deleteStudent('${s.id}')">🗑 Verwijderen</button>
      </div>
    </div>`;
  }

  window.toggleStageFields = function() {
    document.getElementById('stageFields').style.display = document.getElementById('f-geenstage').checked ? 'none' : 'block';
  };

  window.openModal = function(id = null) {
    editId = id;
    document.getElementById('modalTitle').textContent = id ? 'Leerling bewerken' : 'Leerling toevoegen';
    if (id) {
      const s = window._students.find(x => x.id === id);
      document.getElementById('f-naam').value = s.naam || '';
      document.getElementById('f-klas').value = s.klas || '';
      document.getElementById('f-mentor').value = s.mentor || '';
      document.getElementById('f-bedrijf').value = s.bedrijf || '';
      document.getElementById('f-adres').value = s.adres || '';
      document.getElementById('f-begeleider').value = s.begeleider || '';
      document.getElementById('f-telefoon').value = s.telefoon || '';
      document.getElementById('f-datum').value = s.datum || '';
      document.getElementById('f-vrij').value = s.vrij || '';
      document.getElementById('f-geenstage').checked = !!s.geenstage;
      document.getElementById('stageFields').style.display = s.geenstage ? 'none' : 'block';
      const known = ['14','21','28','42','56','0'];
      if (known.includes(String(s.interval))) {
        document.getElementById('f-interval').value = String(s.interval);
        document.getElementById('f-interval-custom').style.display = 'none';
      } else {
        document.getElementById('f-interval').value = 'custom';
        document.getElementById('f-interval-custom').style.display = 'block';
        document.getElementById('f-interval-custom').value = s.interval;
      }
    } else {
      ['f-naam','f-klas','f-mentor','f-bedrijf','f-adres','f-begeleider','f-telefoon','f-vrij'].forEach(i => document.getElementById(i).value = '');
      document.getElementById('f-datum').value = new Date().toISOString().split('T')[0];
      document.getElementById('f-interval').value = '42';
      document.getElementById('f-interval-custom').style.display = 'none';
      document.getElementById('f-geenstage').checked = false;
      document.getElementById('stageFields').style.display = 'block';
    }
    document.getElementById('overlay').style.display = 'flex';
  };

  window.openEditModal = (id) => window.openModal(id);
  window.closeModal = () => { document.getElementById('overlay').style.display = 'none'; editId = null; };
  window.closeIfOutside = (e) => { if (e.target === document.getElementById('overlay')) window.closeModal(); };

  document.getElementById('f-interval').addEventListener('change', function() {
    document.getElementById('f-interval-custom').style.display = this.value === 'custom' ? 'block' : 'none';
  });

  window.saveStudent = async function() {
    const naam = document.getElementById('f-naam').value.trim();
    if (!naam) { alert('Vul minimaal een naam in.'); return; }
    const geenstage = document.getElementById('f-geenstage').checked;
    const sel = document.getElementById('f-interval').value;
    const interval = sel === 'custom' ? (parseInt(document.getElementById('f-interval-custom').value)||42) : parseInt(sel);
    const datum = document.getElementById('f-datum').value;
    if (!geenstage && !datum && interval !== 0) { alert('Vul een bezoekdatum in.'); return; }
    const data = {
      naam, klas: document.getElementById('f-klas').value.trim(),
      mentor: document.getElementById('f-mentor').value.trim(),
      bedrijf: document.getElementById('f-bedrijf').value.trim(),
      adres: document.getElementById('f-adres').value.trim(),
      begeleider: document.getElementById('f-begeleider').value.trim(),
      telefoon: document.getElementById('f-telefoon').value.trim(),
      datum: geenstage ? '' : datum,
      interval: geenstage ? 0 : interval,
      vrij: document.getElementById('f-vrij').value.trim(),
      geenstage,
      notities: editId ? (window._students.find(x=>x.id===editId)?.notities || []) : []
    };
    if (editId) { await window._db.update(editId, data); } else { await window._db.add(data); }
    window.closeModal();
  };

  window.deleteStudent = async function(id) {
    if (!confirm('Weet je zeker dat je deze leerling wilt verwijderen?')) return;
    await window._db.delete(id);
  };

  window.openVisitModal = function(id) {
    visitId = id;
    const s = window._students.find(x => x.id === id);
    document.getElementById('visitStudentName').textContent = `${s.naam} — ${s.bedrijf}`;
    document.getElementById('v-datum').value = new Date().toISOString().split('T')[0];
    document.getElementById('v-notitie').value = '';
    document.getElementById('visitOverlay').style.display = 'flex';
  };

  window.closeVisitModal = () => { document.getElementById('visitOverlay').style.display = 'none'; visitId = null; };
  window.closeVisitIfOutside = (e) => { if (e.target === document.getElementById('visitOverlay')) window.closeVisitModal(); };

  window.saveVisit = async function() {
    const datum = document.getElementById('v-datum').value;
    const tekst = document.getElementById('v-notitie').value.trim();
    if (!datum) { alert('Vul een datum in.'); return; }
    const s = window._students.find(x => x.id === visitId);
    const notities = [...(s.notities || [])];
    if (tekst) notities.push({ datum, tekst });
    await window._db.update(visitId, { datum, notities });
    window.closeVisitModal();
  };
</script>
</body>
</html>
